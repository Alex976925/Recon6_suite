{% extends "base.html" %}
{% block title %}Login · Recon6_Suite{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand" style="padding:0 0 18px 0;"><span class="dot"></span> RECON6_SUITE</div>
    <h2>Iniciar sesión</h2>
    {% if error %}<div class="alert-inline error">{{ error }}</div>{% endif %}
    <form method="post">
      <input class="input-glass" type="text" name="usuario" placeholder="Usuario" required>
      <input class="input-glass" type="password" name="clave" placeholder="Clave" required>
      <button type="submit" class="btn-accent">Entrar</button>
    </form>
    <div class="auth-alt">¿No tienes cuenta? <a href="/registro">Regístrate</a></div>
  </div>
</div>
{% endblock %}
