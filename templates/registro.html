{% extends "base.html" %}
{% block title %}Registro · Recon6_Suite{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand" style="padding:0 0 18px 0;"><span class="dot"></span> RECON6_SUITE</div>
    <h2>Crear cuenta</h2>
    {% if mensaje %}<div class="alert-inline success">{{ mensaje }}</div>{% endif %}
    <form method="post">
      <input class="input-glass" type="text" name="usuario" placeholder="Nuevo usuario" required>
      <input class="input-glass" type="password" name="clave" placeholder="Nueva clave" required>
      <button type="submit" class="btn-accent">Registrar</button>
    </form>
    <div class="auth-alt">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></div>
  </div>
</div>
{% endblock %}
